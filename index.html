<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería SVG</title>
  <style>
    body { font-family: Arial; text-align: center; background:#f5f5f5; }
    .galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
    img { width: 100%; background: white; padding: 10px; border-radius: 10px; }

    a { display: block;}

a:hover img {transform: scale(1.05);}
  </style>
</head>
<body>

const contenedor = document.getElementById("galeria");

archivos.forEach(nombre => {
  const link = document.createElement("a");
  link.href = "svg/" + nombre;
  link.target = "_blank"; // abrir en nueva pestaña

  const img = document.createElement("img");
  img.src = "svg/" + nombre;

  link.appendChild(img);
  contenedor.appendChild(link);
});
</script>

</body>
</html>
